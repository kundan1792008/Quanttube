# nginx – HLS and DASH streaming configuration for Quanttube CDN Edge nodes
#
# Segment layout expected on disk:
#   /var/hls/<mediaId>/<resolution>/master.m3u8   (HLS master playlist)
#   /var/hls/<mediaId>/<resolution>/seg<N>.ts      (HLS transport stream segments)
#   /var/dash/<mediaId>/<resolution>/manifest.mpd  (DASH manifest)
#   /var/dash/<mediaId>/<resolution>/seg<N>.m4s    (DASH media segments)

server {
    listen 80;
    server_name _;

    # Minimal health endpoint for Docker / load-balancer probes
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ------------------------------------------------------------------
    # HLS delivery
    # Clients request: /hls/<mediaId>/<resolution>/master.m3u8
    # ------------------------------------------------------------------
    location /hls/ {
        root /var;

        # Allow browsers and native players to access HLS resources
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range" always;
        add_header Cache-Control               "public, max-age=2";

        # HLS playlist MIME types
        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t                    ts;
        }

        # Byte-range requests are required for adaptive bitrate clients
        add_header Accept-Ranges bytes;
    }

    # ------------------------------------------------------------------
    # DASH delivery
    # Clients request: /dash/<mediaId>/<resolution>/manifest.mpd
    # ------------------------------------------------------------------
    location /dash/ {
        root /var;

        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range" always;
        # DASH manifests are updated frequently – keep TTL short
        add_header Cache-Control               "public, max-age=2";

        types {
            application/dash+xml mpd;
            video/iso.segment    m4s;
            video/mp4            mp4;
        }

        add_header Accept-Ranges bytes;
    }
}
